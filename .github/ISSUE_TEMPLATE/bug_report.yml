name: Bug Report
description: Report a crash, scan error, or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below so we can investigate.

        **Do not share tenant IDs, user names, or other personally identifiable information.**

  - type: input
    id: version
    attributes:
      label: Siemserva Version
      description: "Run `siemserva --version` or check the About tab"
      placeholder: "e.g. 0.1.0-beta"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect vs what actually happened?
      placeholder: "When I ran a scan, the dashboard showed..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run siemserva with...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output or logs
      description: Paste any relevant error messages or log output. Redact any sensitive information.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, environment details, etc.
    validations:
      required: false
