name: Mirror Private Releases to Public

on:
  schedule:
    - cron: '0 9 * * 1'  # Poll every Monday at 9am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror-releases:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Fetch all releases from the private build repo
      # ------------------------------------------------------------------
      - name: Fetch private releases
        env:
          PRIVATE_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          PRIVATE_REPO: ${{ secrets.PRIVATE_REPO }}
        run: |
          echo "Fetching releases from: ${PRIVATE_REPO}"

          HTTP_CODE=$(curl -s -o private-releases.json -w "%{http_code}" \
            -H "Authorization: Bearer $PRIVATE_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${PRIVATE_REPO}/releases?per_page=100")

          echo "HTTP status: ${HTTP_CODE}"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "API error response:"
            cat private-releases.json
            exit 1
          fi

          echo "Private releases found: $(jq length private-releases.json)"

      # ------------------------------------------------------------------
      # Fetch existing public release tags so we know what to skip
      # ------------------------------------------------------------------
      - name: Fetch existing public release tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/releases?per_page=100" \
            --jq '.[].tag_name' > public-tags.txt

          echo "Already published tags:"
          cat public-tags.txt

      # ------------------------------------------------------------------
      # Mirror the latest private release if not yet published publicly.
      # ------------------------------------------------------------------
      - name: Mirror latest release
        env:
          PRIVATE_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # .[0] is the latest release (GitHub returns newest-first)
          release=$(jq -c '.[0]' private-releases.json)

          if [ -z "$release" ] || [ "$release" = "null" ]; then
            echo "No releases found in private repo."
            exit 0
          fi

          TAG=$(echo "$release" | jq -r '.tag_name')
          echo "Latest private release: $TAG"

          # Skip if already published publicly
          if grep -qxF "$TAG" public-tags.txt; then
            echo "Already published: $TAG — nothing to do."
            exit 0
          fi

          echo "=== Mirroring: $TAG ==="

          echo "$release" | jq -r '.name'       > release-title.txt
          echo "$release" | jq -r '.body // ""' > release-notes.txt
          IS_PRERELEASE=$(echo "$release" | jq -r '.prerelease')

          # Strip internal-only content from release notes before publishing
          sed -i 's/ or `siemserva-[^`]*-unsigned\.zip`//g' release-notes.txt
          sed -i '/| Linux x64 |/d' release-notes.txt
          sed -i '/^### Non-AOT Builds/,/^$/d' release-notes.txt
          sed -i '/^Unsigned AOT builds/d' release-notes.txt

          # Collect signed zip assets only
          echo "$release" | jq -r '
            .assets[]
            | select(.name | test("-signed\\.zip$"; "i"))
            | [.name, .url]
            | @tsv
          ' > assets.tsv

          if [ ! -s assets.tsv ]; then
            echo "::error::No signed zip assets found in $TAG."
            exit 1
          fi

          # Download signed zips
          mkdir -p ./release-assets
          while IFS=$'\t' read -r name url; do
            echo "  Downloading: $name"
            curl -sfL \
              -H "Authorization: Bearer $PRIVATE_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$url" \
              -o "./release-assets/$name"
          done < assets.tsv

          # Append to version.json if this tag isn't already listed
          if ! jq -e --arg t "$TAG" '.releases[] | select(.tag == $t)' version.json > /dev/null 2>&1; then
            TITLE=$(cat release-title.txt)
            NEW_ENTRY=$(jq -n \
              --arg version  "$TITLE" \
              --arg tag      "$TAG" \
              --arg whatsNew "$TITLE" \
              '{version: $version, tag: $tag, whatsNew: $whatsNew, mandatory: false}')

            jq --argjson e "$NEW_ENTRY" '.releases += [$e]' version.json > version.json.tmp
            mv version.json.tmp version.json

            git add version.json
            git commit -m "chore: add $TAG to version.json"
            git push
          fi

          # Publish the release
          PRERELEASE_FLAG=""
          [ "$IS_PRERELEASE" = "true" ] && PRERELEASE_FLAG="--prerelease"

          gh release create "$TAG" \
            --title "$(cat release-title.txt)" \
            --notes-file release-notes.txt \
            $PRERELEASE_FLAG \
            ./release-assets/*

          echo "::notice::Published: $TAG"
